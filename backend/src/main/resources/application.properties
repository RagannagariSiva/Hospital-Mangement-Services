spring.application.name=hotel-platform

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=hoteluser
spring.datasource.password=hotelpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080

# JWT - both formats to cover all cases
jwt.secret=hotelPlatformSuperSecretKeyForJWTTokenGeneration2024XYZ
jwt.expiration=86400000
jwt.refresh-expiration=604800000
app.jwt.secret=hotelPlatformSuperSecretKeyForJWTTokenGeneration2024XYZ
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Disable Redis
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.com.hotel=INFO

# Mail - disabled for local dev
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@hotelpro.com
spring.mail.password=dummypassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
